<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CoolBreeze Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>

  <div class="d-flex">

    <!-- Sidebar -->
    <div class="d-flex flex-column flex-shrink-0 p-3 text-white" style="width:240px;min-height:100vh;background:#1a1a2e;">
      <span class="fs-6 fw-bold mb-3">❄️ CoolBreeze AC</span>
      <hr/>
      <ul class="nav nav-pills flex-column mb-auto">
        <li class="nav-item">
          <a href="#" class="nav-link text-white">
            💬 Conversations
          </a>
        </li>
      </ul>
      <hr/>
      <span style="font-size:11px;opacity:0.5;">Logged in as admin</span>
    </div>

    <!-- Main Content -->
    <div class="flex-grow-1 p-4">

        {% block content %}

        {% endblock %}

    </div> <!-- main content ending -->
  </div>

</body>
</html>
